<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShelfSense Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <aside class="sidebar" id="sidebar">
        <div class="brand" onclick="toggleSidebar()">
          <div class="brand-logo">
            <i data-lucide="layout-dashboard"></i>
          </div>
          <span class="brand-text">ShelfSense</span>
        </div>

        <nav class="nav">
          <div class="nav-group">
            <div class="nav-title">Management</div>
            <button class="nav-item" onclick="openAddModal()">
              <i data-lucide="plus-circle"></i>
              <span class="nav-label">Add Product</span>
            </button>
            <button class="nav-item" onclick="openUpdateModal()">
              <i data-lucide="edit-3"></i>
              <span class="nav-label">Update Product</span>
            </button>
            <button class="nav-item" onclick="openDeleteModal()">
              <i data-lucide="trash-2"></i>
              <span class="nav-label">Delete Product</span>
            </button>
          </div>

          <div class="nav-group">
            <div class="nav-title">System</div>
            <button class="nav-item" onclick="openAlertsModal()">
              <i data-lucide="bell"></i>
              <span class="nav-label">Check Alerts</span>
            </button>
          </div>
        </nav>

        <button class="exit-btn" id="exitBtn">
          <i data-lucide="log-out"></i>
          <span class="nav-label">Exit System</span>
        </button>
      </aside>

      <main class="content">
        <header class="topbar">
          <div class="search-container">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" placeholder="Search inventory..." id="searchInput" />
          </div>
          <div class="header-meta">
            <div class="time-block">
              <span class="time" id="timeLine">12:00 PM</span>
              <span class="date" id="dateLine">May 09, 2026</span>
            </div>
          </div>
        </header>

        <section class="section-header">
          <h2>Inventory</h2>
          <div class="header-actions">
            <select class="filter-select" id="filterSelect">
              <option value="All">All Categories</option>
              <option value="Books">Books</option>
              <option value="Magazines">Magazines</option>
              <option value="Stationery">Stationery</option>
            </select>
          </div>
        </section>

        <section class="stats-grid">
          <article class="stat-card" data-category="Books">
            <div class="stat-icon books">
              <i data-lucide="book"></i>
            </div>
            <div class="stat-info">
              <span class="stat-label">Books</span>
              <span class="stat-value">0</span>
            </div>
          </article>
          <article class="stat-card" data-category="Magazines">
            <div class="stat-icon magazines">
              <i data-lucide="layers"></i>
            </div>
            <div class="stat-info">
              <span class="stat-label">Magazines</span>
              <span class="stat-value">0</span>
            </div>
          </article>
          <article class="stat-card" data-category="Stationery">
            <div class="stat-icon stationery">
              <i data-lucide="pen-tool"></i>
            </div>
            <div class="stat-info">
              <span class="stat-label">Stationery</span>
              <span class="stat-value">0</span>
            </div>
          </article>
        </section>

        <section class="table-container">
          <div class="table-wrapper">
            <table class="inventory-table">
              <thead>
                <tr>
                  <th>Product Name</th>
                  <th>Price</th>
                  <th>Quantity</th>
                  <th>Category</th>
                  <th class="actions-cell">Actions</th>
                </tr>
              </thead>
              <tbody id="inventoryBody">
                <!-- Data injected here -->
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <!-- Modal System -->
    <div id="modalOverlay" class="modal-overlay">
      <div class="modal-container">
        <div class="modal-header">
          <div class="modal-title-group">
            <h3 id="modalTitle">Modal Title</h3>
            <p id="modalSubtitle">Subtext description</p>
          </div>
          <button class="close-btn" onclick="closeModal()">
            <i data-lucide="x"></i>
          </button>
        </div>

        <div class="modal-body"></div>

        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" id="modalConfirmBtn">Confirm Action</button>
        </div>
      </div>
    </div>

  
    <script src="/js/script.js"></script>
  </body>
</html>
